version: 1
updated: 2026-03-03

orchestrator:
  name: codex-orchestrator
  responsibility: Owns planning, routing, conflict resolution, and merge order.
  coordination_rules:
    - Every agent writes artifacts only in its assigned paths.
    - Handoffs must include inputs used, outputs produced, and open risks.
    - Breaking interface changes require schema update + test update in same handoff.

agents:
  - id: A1
    name: notebook-architect
    mission: Maintain notebook UX and execution flow.
    skills:
      - jupyter-notebook
    owns:
      - output/jupyter-notebook/task-notebook.ipynb
    input_contract:
      - module API from task_analysis/core.py
    output_contract:
      - notebook cells execute top-to-bottom
      - summary and artifact cells remain deterministic

  - id: A2
    name: validation-engineer
    mission: Enforce input schema and normalization rules.
    skills:
      - none
    owns:
      - task_analysis/core.py
    input_contract:
      - raw_items schema v1
    output_contract:
      - actionable ValidationError messages
      - coercion policy behavior covered by tests

  - id: A3
    name: analytics-engineer
    mission: Maintain metric correctness and delta logic.
    skills:
      - none
    owns:
      - task_analysis/core.py
      - output/artifacts/summary.json (contract)
    input_contract:
      - list[TaskItem]
    output_contract:
      - summary schema v1 fields preserved
      - largest_positive_delta_* behavior deterministic

  - id: A4
    name: qa-test-engineer
    mission: Build and maintain regression/unit test coverage.
    skills:
      - none
    owns:
      - tests/test_core.py
      - scripts/notebook_smoke_test.py
    input_contract:
      - core module public API
      - notebook deterministic baseline
    output_contract:
      - failing tests for regressions
      - green suite for accepted changes

  - id: A5
    name: ci-release-engineer
    mission: Keep CI quality gates reliable and fast.
    skills:
      - none
    owns:
      - .github/workflows/quality.yml
      - requirements.txt
      - pyproject.toml
      - .python-version
    input_contract:
      - reproducible python runtime
    output_contract:
      - PR gate runs unit + notebook smoke tests

  - id: A6
    name: docs-runbook-engineer
    mission: Keep operational docs and troubleshooting current.
    skills:
      - doc
    owns:
      - README.md
      - RUNBOOK.md
      - TICKETS.md
    input_contract:
      - implemented behavior from code/tests
    output_contract:
      - setup/run/incident docs match actual system behavior

  - id: A7
    name: interface-audit-engineer
    mission: Verify public contract drift and compatibility.
    skills:
      - openai-docs
      - pdf
    owns:
      - contract notes in TICKETS.md
      - optional generated compliance reports under output/
    input_contract:
      - summary schema v1
      - input schema v1
    output_contract:
      - documented contract diffs before/after changes

  - id: A8
    name: collaboration-admin
    mission: Maintain issue/PR hygiene templates and process guardrails.
    skills:
      - skill-creator
      - skill-installer
    owns:
      - .github/ISSUE_TEMPLATE/*
      - .github/pull_request_template.md
      - agents/*
    input_contract:
      - team workflow requirements
    output_contract:
      - actionable issue template + PR checklist quality

  - id: A9
    name: frontend-engineer
    mission: Harden frontend components, optimize bundles, and ensure PWA production readiness.
    skills:
      - frontend-engineer
    owns:
      - client/src/components/*
      - client/src/pages/*
      - vite.config.ts
      - client/public/sw.js
      - client/public/manifest.json
    input_contract:
      - UX specs from ux-designer
      - component inventory from solution-architect
    output_contract:
      - component audit with a11y/states verification
      - bundle optimization report with before/after sizes

  - id: A10
    name: backend-engineer
    mission: Harden APIs, fix data patterns, and complete payment integration.
    skills:
      - backend-engineer
    owns:
      - server/routes.ts
      - server/routes/*
      - server/storage.ts
      - server/stripe-routes.ts
      - server/db.ts
    input_contract:
      - API contracts from solution-architect
      - security requirements from security-engineer
    output_contract:
      - API audit with validation coverage
      - Stripe webhook event matrix completion

  - id: A11
    name: devops-sre
    mission: Automate CI/CD, containerize, and establish deployment infrastructure.
    skills:
      - devops-sre
    owns:
      - .github/workflows/*
      - Dockerfile
      - docker-compose.yml
    input_contract:
      - build/test commands from package.json
      - health check specs from backend-engineer
    output_contract:
      - CI pipeline with JS + Python gates
      - deployment runbook with rollback

  - id: A12
    name: security-engineer
    mission: Enforce OWASP compliance and harden application security posture.
    skills:
      - security-engineer
    owns:
      - server/middleware/security.ts
      - server/middleware/rateLimiter.ts
      - server/crypto.ts
    input_contract:
      - API surface from backend-engineer
      - component list from frontend-engineer
    output_contract:
      - OWASP compliance matrix
      - secrets audit with rotation plan

  - id: A13
    name: data-analytics-engineer
    mission: Build reliable analytics pipeline and enforce data privacy.
    skills:
      - data-analytics
    owns:
      - server/routes/analytics.ts
      - output/analytics/*
    input_contract:
      - event tracking requirements from technical-pm
      - query patterns from database-engineer
    output_contract:
      - event catalog with schema definitions
      - data retention policy

  - id: A14
    name: performance-engineer
    mission: Establish performance baselines and optimize for production load.
    skills:
      - performance-engineer
    owns:
      - output/performance/*
    input_contract:
      - bundle config from frontend-engineer
      - query patterns from database-engineer
    output_contract:
      - performance budget document
      - load test results with pass/fail

  - id: A15
    name: database-engineer
    mission: Optimize schema, indexes, migrations, and data integrity.
    skills:
      - database-engineer
    owns:
      - shared/schema.ts
      - drizzle.config.ts
      - migrations/*
    input_contract:
      - schema definition from shared/schema.ts
      - query patterns from backend-engineer and analytics
    output_contract:
      - index strategy with SQL statements
      - migration workflow specification

  - id: A16
    name: release-manager
    mission: Coordinate cross-agent release readiness and rollback.
    skills:
      - release-manager
    owns:
      - CHANGELOG.md
      - output/releases/*
    input_contract:
      - gate reports from all agents
    output_contract:
      - release checklist with go/no-go decision
      - rollback playbook

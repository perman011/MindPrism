version: 2
updated: 2026-03-06

orchestrator:
  id: ORCH
  name: codex-orchestrator
  responsibility: Owns planning, routing, merge order, and release risk visibility.
  coordination_rules:
    - Every agent writes artifacts only in assigned output paths.
    - Handoffs must state inputs consumed, outputs produced, risks, and next owner.
    - Interface-breaking changes require schema or contract tests in the same change set.
    - No release signoff without QA, security, and performance gate evidence.

agents:
  - id: A1
    role_id: UX
    name: ux-designer
    mission: Define premium, accessible product UX and implementation-ready flow specs.
    skills:
      - ux-designer
    owns:
      - output/design/ux-brief.md
      - output/design/feature-flow-spec.md
    input_contract:
      - Product goals, user segments, and constraints from TPM
      - Architecture boundaries from ARCH
    output_contract:
      - Flow specs include desktop/mobile states and error paths
      - Accessibility notes included for key components

  - id: A2
    role_id: TPM
    name: technical-pm
    mission: Translate product vision into executable PRDs, tickets, and milestones.
    skills:
      - technical-pm
    owns:
      - output/product/mindprism-technical-prd.md
      - output/product/mindprism-execution-tickets.md
    input_contract:
      - UX spec package from UX
      - NFR requirements from ARCH, SEC, OPS
    output_contract:
      - Tickets are sequenced and dependency-linked
      - Acceptance criteria are testable and role-assigned

  - id: A3
    role_id: ARCH
    name: solution-architect
    mission: Establish scalable system design and enforce interface contracts.
    skills:
      - solution-architect
    owns:
      - output/architecture/target-architecture.md
      - output/architecture/architecture-scorecard.md
      - output/architecture/adrs/
    input_contract:
      - Current code topology in client/server/shared
      - Product scope from TPM
    output_contract:
      - ADR decisions with alternatives and consequences
      - Explicit service boundaries and integration contracts

  - id: A4
    role_id: DBA
    name: database-engineer
    mission: Ensure data model, indexes, and migrations are production-safe.
    skills:
      - database-engineer
    owns:
      - output/database/db-audit.md
      - output/database/index-strategy.md
      - shared/schema.ts
      - drizzle.config.ts
    input_contract:
      - Query hotspots from BE and DATA
      - Scale assumptions from ARCH and PERF
    output_contract:
      - Index strategy tied to real query paths
      - Migration workflow with rollback strategy

  - id: A5
    role_id: SEC
    name: security-engineer
    mission: Harden app security posture and verify OWASP controls.
    skills:
      - security-engineer
    owns:
      - output/security/security-audit.md
      - output/security/owasp-matrix.md
      - server/middleware/security.ts
      - server/middleware/rateLimiter.ts
    input_contract:
      - API and auth surfaces from BE
      - Client attack surfaces from FE
    output_contract:
      - Risks prioritized by severity and exploitability
      - Remediation plan and verification checks included

  - id: A6
    role_id: BE
    name: backend-engineer
    mission: Deliver resilient API and billing behavior with strong validation.
    skills:
      - backend-engineer
    owns:
      - output/backend/api-audit.md
      - output/backend/stripe-event-matrix.md
      - server/routes.ts
      - server/routes/
      - server/stripe-routes.ts
      - server/storage.ts
    input_contract:
      - API contracts from ARCH
      - Security controls from SEC
      - Data constraints from DBA
    output_contract:
      - Endpoint validation + error taxonomy coverage
      - Stripe lifecycle handling verified with tests

  - id: A7
    role_id: FE
    name: frontend-engineer
    mission: Implement robust, performant, and accessible user/admin experiences.
    skills:
      - frontend-engineer
    owns:
      - output/frontend/component-audit.md
      - output/frontend/bundle-report.md
      - client/src/components/
      - client/src/pages/
      - client/public/manifest.json
      - client/public/sw.js
    input_contract:
      - UX specs from UX
      - Interface contracts from ARCH + BE
      - Security requirements from SEC
    output_contract:
      - Component behavior includes loading/error/empty states
      - Bundle and route loading regressions tracked and bounded

  - id: A8
    role_id: DATA
    name: data-analytics-engineer
    mission: Keep analytics trustworthy, queryable, and privacy compliant.
    skills:
      - data-analytics
    owns:
      - output/analytics/event-audit.md
      - output/analytics/retention-policy.md
      - server/routes/analytics.ts
      - client/src/lib/analytics.ts
    input_contract:
      - Event requirements from TPM
      - Schema/index guidance from DBA
    output_contract:
      - Event taxonomy with clear naming and payload schema
      - Retention policy aligned to compliance constraints

  - id: A9
    role_id: OPS
    name: devops-sre
    mission: Maintain reliable delivery pipelines and operational readiness.
    skills:
      - devops-sre
    owns:
      - output/devops/infra-audit.md
      - output/devops/deployment-runbook.md
      - .github/workflows/
      - Dockerfile
      - docker-compose.yml
    input_contract:
      - Build and runtime needs from FE/BE
      - Gate requirements from QA, SEC, PERF
    output_contract:
      - CI/CD gates map to release criteria
      - Runbook includes rollback and incident steps

  - id: A10
    role_id: PERF
    name: performance-engineer
    mission: Enforce performance budgets and load resilience.
    skills:
      - performance-engineer
    owns:
      - output/performance/perf-report.md
      - output/performance/load-test-results.md
    input_contract:
      - Frontend bundle profile from FE
      - API/query behavior from BE and DBA
    output_contract:
      - Measured baseline with pass/fail thresholds
      - Bottleneck remediation plan and re-test evidence

  - id: A11
    role_id: QA
    name: qa-e2e-engineer
    mission: Guard end-to-end quality across user and admin workflows.
    skills:
      - qa-e2e
    owns:
      - output/qa/e2e-matrix.csv
      - output/qa/release-gate-report.md
      - tests/
    input_contract:
      - Acceptance criteria from TPM
      - Environment stability from OPS
    output_contract:
      - Coverage includes auth, billing, media, publishing, admin analytics
      - Release gate clearly states go/no-go with blocking defects

  - id: A12
    role_id: RM
    name: release-manager
    mission: Coordinate final launch decisions with objective gate evidence.
    skills:
      - release-manager
    owns:
      - output/releases/release-checklist.md
      - output/releases/changelog.md
    input_contract:
      - QA, SEC, PERF gate reports
      - Deployment readiness from OPS
    output_contract:
      - Consolidated go/no-go decision with explicit rollback criteria
      - Versioned release packet and comms checklist

  - id: A13
    role_id: PO
    name: product-owner
    mission: Own product vision, competitive positioning, and go-to-market strategy.
    skills:
      - product-owner
    owns:
      - output/product/competitive-matrix.md
      - output/product/user-personas.md
      - output/product/feature-prioritization.md
      - output/product/gtm-plan.md
    input_contract:
      - Market research and competitor analysis
      - User feedback and engagement metrics from DATA
      - Revenue data from BE (Stripe)
    output_contract:
      - User personas with JTBD and willingness-to-pay
      - RICE-scored feature backlog
      - GTM plan with phased rollout milestones

  - id: A14
    role_id: GROWTH
    name: growth-engineer
    mission: Maximize user acquisition, activation, retention, and monetization.
    skills:
      - growth-engineer
    owns:
      - output/growth/growth-audit.md
      - output/growth/gamification-spec.md
      - output/growth/retention-dashboard-spec.md
    input_contract:
      - Funnel metrics from DATA
      - Feature scope from TPM
      - UX flows from UX
    output_contract:
      - Funnel analysis with conversion benchmarks
      - Gamification system spec with XP/level/badge definitions
      - A/B test roadmap with hypothesis and success criteria

  - id: A15
    role_id: CONTENT
    name: content-strategist
    mission: Curate and maintain a high-quality psychology content library.
    skills:
      - content-strategist
    owns:
      - output/content/content-audit.md
      - output/content/content-calendar.md
      - output/content/style-guide.md
    input_contract:
      - Product goals and target audience from PO
      - Content schema from DBA
      - SEO requirements from FE
    output_contract:
      - Content quality scores for all books
      - Writing style guide for chapters, models, and shorts
      - 12-week content calendar with publishing cadence

  - id: A16
    role_id: MOBILE
    name: mobile-engineer
    mission: Deliver production-ready iOS and Android builds via Capacitor.
    skills:
      - mobile-engineer
    owns:
      - output/mobile/mobile-audit.md
      - output/mobile/store-submission-packet.md
      - android/
      - ios/
      - capacitor.config.ts
    input_contract:
      - Web app stability from FE
      - API contracts from BE
      - Push notification config from OPS
    output_contract:
      - iOS and Android builds pass store review criteria
      - Native features (push, haptics, deep links) verified
      - IAP billing integrated and tested
